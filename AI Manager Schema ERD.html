document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

flex:none'});\n          if(c.k==='flight') tags.push({label:'in-flight',style:'font-size:9px;padding:0 5px;border-radius:3px;background:rgba(227,162,59,0.16);color:#e3a23b;white-space:nowrap'});\n          return { icon:'●', iconStyle:`color:${kc}`, name:c.n, nameStyle:'color:#dbe4f3',\n            type:c.label, typeStyle:'color:#7e8aa6;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap',\n            extra:'', extraStyle:'display:none', tags, onType:null };\n        });\n      }\n      return t.cols.map(c=>{\n        const icon = c.pk?'◆':(c.fk?'◇':'');\n        const iconStyle = c.pk?'color:#e3b341':(c.fk?'color:#5aa6ff':'color:transparent');\n        const nameStyle = c.pk?'color:#f0f4fc;font-weight:600':(c.fk?'color:#9ec8ff':'color:#c4cee0');\n        const name = c.n + (c.nl?'?':'');\n        const isJ = !!c.shape;\n        const tags=[];\n        if(c.uq) tags.push({label:'UQ',style:'font-size:9px;padding:0 4px;border-radius:3px;background:rgba(139,123,255,0.16);color:#a78bff'});\n        if(c.en) tags.push({label:'enum',style:'font-size:9px;padding:0 4px;border-radius:3px;background:rgba(167,139,255,0.16);color:#a78bff'});\n        let extra='', extraStyle='display:none';\n        if(c.fk){ extra='→ '+c.fk; extraStyle='color:'+(c.soft?'#6f7b97':'#5aa6ff')+';font-size:10.5px;opacity:.85;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'; }\n        else if(c.def){ extra='· '+c.def; extraStyle='color:#6b7794;font-size:10.5px;white-space:nowrap'; }\n        else if(c.note){ extra='· '+c.note; extraStyle='color:#5e6a85;font-size:10px;white-space:nowrap'; }\n        const typeStyle = isJ\n          ? 'color:#1bb38c;cursor:pointer;border-bottom:1px dotted #1bb38c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap'\n          : 'color:#58c2bd;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';\n        return { icon, iconStyle, name, nameStyle, type:c.t, typeStyle, extra, extraStyle, tags,\n          onType: isJ ? (()=>this.openJsonb(c.shape)) : null };\n      });\n    };\n\n    const tables=this.SCHEMA.filter(t=>this.visible(t)).map(t=>{\n      const color=this.GROUPS[t.group];\n      const p=positions[t.name];\n      const isHi = hovered===t.name;\n      const op = dim ? (isHi||related.has(t.name)?1:0.26) : 1;\n      const z = isHi? 8 : (t.isEnum?3:2);\n      return {\n        name:t.name, hasSub:!!t.sub, subtitle:t.sub||'', hasIdx:!!t.idx, indexText:t.idx||'',\n        dotStyle:`background:${color}`,\n        tagLabel: t.isEnum?'enum':(t.group==='framework'?'infra':'table'),\n        tagStyle:`font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:${color};background:${this.hexToRgba(color,0.14)};padding:2px 7px;border-radius:4px;flex:none`,\n        cardStyle:`position:absolute;left:${p.x}px;top:${p.y}px;width:${W}px;background:#131a2b;border:1px solid ${isHi?color:'#25304a'};border-top:3px solid ${color};border-radius:9px;box-shadow:0 ${isHi?'14px 40px':'8px 26px'} rgba(0,0,0,0.45);opacity:${op};z-index:${z};overflow:hidden;transition:opacity .14s,border-color .14s,box-shadow .14s`,\n        headerStyle:`display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;background:${this.hexToRgba(color,0.13)};cursor:grab`,\n        rows:mkRows(t),\n        onHeaderDown:(e)=>this.startNode(e,t.name),\n        onEnter:()=>this.setHover(t.name),\n      };\n    });\n\n    // nav lists\n    const navStyleFor=(name,color)=>{\n      const active=hovered===name;\n      return `width:calc(100% - 16px);margin:1px 8px;display:flex;align-items:center;gap:9px;padding:6px 8px;background:${active?'#16203a':'none'};border:none;border-radius:6px;color:${active?'#e8eefc':'#9aa6c2'};font-family:inherit;font-size:12px;cursor:pointer`;\n    };\n    const navItem=(t)=>({ name:t.name, count:String(t.cols.length),\n      dotStyle:`background:${this.GROUPS[t.group]}`, navStyle:navStyleFor(t.name),\n      onClick:()=>this.focusTable(t.name), onEnter:()=>this.setHover(t.name) });\n    const coreList=this.SCHEMA.filter(t=>['users','personas','social_accounts','posts','media'].includes(t.name)).map(navItem);\n    const fwList=this.SCHEMA.filter(t=>t.group==='framework').map(navItem);\n    const enumNav={ navStyle:navStyleFor('PostStatus'), onClick:()=>this.focusTable('PostStatus'), onEnter:()=>this.setHover('PostStatus') };\n\n    const shapeLinks=[\n      {no:'7.1',label:'personas.schema',key:'persona_schema'},\n      {no:'7.2',label:'social_accounts.analytics',key:'account_analytics'},\n      {no:'7.3',label:'posts.analytics',key:'post_analytics'},\n      {no:'7.4',label:'posts.post_options',key:'post_options'},\n    ].map(s=>({...s, onClick:()=>this.openJsonb(s.key)}));\n\n    const drawer=this.buildDrawer();\n    const cursor = this.state.dragging==='__pan' ? 'grabbing' : (this.state.dragging?'grabbing':'grab');\n\n    return {\n      canvasRef:this.canvasRef,\n      canvasStyle:`flex:1;position:relative;overflow:hidden;background:#0b0f17;cursor:${cursor}`,\n      gridStyle: showGrid\n        ? 'position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.05) 1px,transparent 1px);background-size:26px 26px;pointer-events:none'\n        : 'display:none',\n      worldStyle:`position:absolute;left:0;top:0;transform:translate(${pan.x}px,${pan.y}px) scale(${zoom});transform-origin:0 0`,\n      paths, dots, tables, coreList, fwList, enumNav, shapeLinks,\n      zoomPct:Math.round(zoom*100),\n      onCanvasDown:this.startPan, clearHover:this.clearHover,\n      zoomIn:this.zoomIn, zoomOut:this.zoomOut, fit:this.fit, resetLayout:this.resetLayout,\n      toggleFramework:this.toggleFramework, openNotes:this.openNotes, closeDrawer:this.closeDrawer,\n      fwBtnStyle:`height:32px;padding:0 12px;background:${showFramework?'#16203a':'#141c2e'};color:${showFramework?'#9ec8ff':'#cdd7ec'};border:1px solid ${showFramework?'#33507e':'#2a3550'};border-radius:7px;font-family:inherit;font-size:12px;cursor:pointer`,\n      drawerOpen:!!drawer, drawerKicker:drawer?drawer.kicker:'', drawerTitle:drawer?drawer.title:'', drawerBody:drawer?drawer.body:null,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
